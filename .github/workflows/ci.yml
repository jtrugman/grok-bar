name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  unit:
    name: unit + coverage + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Unit tests with coverage thresholds
        run: npm run test:coverage
      - name: Validate manifest / providers
        run: npm run validate
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: playwright extension smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium + system deps
        run: npx playwright install chromium --with-deps
      - name: Install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Extension smoke (headed under xvfb)
        # Extensions require headed Chromium; xvfb provides a virtual display on CI.
        run: xvfb-run --auto-servernum npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

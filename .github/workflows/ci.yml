name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  check:
    name: test + validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Run quality gate
        run: npm run check
